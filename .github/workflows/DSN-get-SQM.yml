name: DSN-get-SQM Data

on:
  schedule:
    - cron: '0 8 * * 2'  # 08:00 UTC every Tuesday
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dsn-get-sqm-data
  cancel-in-progress: false

env:
  NEW_PATH: "DSNdata/NEW/"
  BOX_REMOTE: "DSNBox:DSNdata/SQM/"
  MERGE_PATH: "DSNdata/MERGE/"
  SQMTABLE_CSV: "DSNdata/SQMtable.csv"
  LOG_FILE: "DSNdata/SQMdownloaded.log"

jobs:
  sync-sqm-data:
    # This runner must be the DSN iMac account whose normal rclone.conf
    # already contains the working remotes DSNBox: and soazdsn:.
    runs-on: [self-hosted, macOS, DSN-iMac]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify local tools and rclone remotes
        shell: bash
        run: |
          set -euo pipefail

          echo "Runner: $(hostname)"
          echo "User: $(whoami)"
          echo "Python: $(command -v python3)"
          python3 --version
          echo "rclone: $(command -v rclone)"
          rclone version | head -1
          echo "rclone config:"
          rclone config file

          echo "Configured remotes:"
          rclone listremotes

          rclone listremotes | grep -Fxq 'soazdsn:' || {
            echo "ERROR: soazdsn: is missing from the runner user's rclone config" >&2
            exit 1
          }

          rclone listremotes | grep -Fxq 'DSNBox:' || {
            echo "ERROR: DSNBox: is missing from the runner user's rclone config" >&2
            exit 1
          }

          echo "Testing Google Drive:"
          rclone lsd soazdsn: >/dev/null

          echo "Testing Box:"
          rclone lsd DSNBox: >/dev/null

      - name: Ensure Python dependency
        shell: bash
        run: |
          set -euo pipefail
          python3 -c 'import pandas' 2>/dev/null || python3 -m pip install --user pandas

      - name: Ensure log file exists
        shell: bash
        run: touch "$LOG_FILE"

      - name: Process each site in SQMtable.csv
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$SQMTABLE_CSV" ]; then
            echo "ERROR: $SQMTABLE_CSV not found" >&2
            exit 1
          fi

          mkdir -p "$NEW_PATH"
          awk 'NF' "$SQMTABLE_CSV" | sed 's/\r$//' > cleaned_sqm.csv

          while IFS=, read -r site_name sequence alias; do
            if [[ -z "$site_name" || "$site_name" == "Site" ]]; then
              continue
            fi

            echo "---- Processing Site: $site_name (Seq: $sequence)"
            SITE_FOLDER="soazdsn:DSNdata/DSNsites/$site_name"
            LOCAL_FOLDER="DSNdata/$site_name"
            mkdir -p "$LOCAL_FOLDER"

            echo "Checking for new .dat, .csv, and .xlsx files in $SITE_FOLDER..."
            rclone lsf "$SITE_FOLDER" --files-only \
              | grep -Ei '\.(dat|csv|xlsx)$' > available_files.txt || true

            grep -Fxvf "$LOG_FILE" available_files.txt > new_files.txt || true

            if [ -s new_files.txt ]; then
              echo "Downloading new files..."

              while IFS= read -r file; do
                [ -n "$file" ] || continue

                echo "Downloading: $file"
                rclone copyto "$SITE_FOLDER/$file" "$LOCAL_FOLDER/$file" --verbose
                echo "$file" >> "$LOG_FILE"
              done < new_files.txt

              python3 DSN_rename_sqm_files.py "$LOCAL_FOLDER" "$SQMTABLE_CSV"

              for file in "$LOCAL_FOLDER"/*; do
                if [ -f "$file" ]; then
                  mv "$file" "$NEW_PATH"
                  echo "Moved $file to $NEW_PATH"
                fi
              done
            else
              echo "No new files for $site_name, skipping."
            fi
          done < cleaned_sqm.csv

      - name: Upload new files to Box
        shell: bash
        run: |
          set -euo pipefail

          echo "NEW_PATH: $NEW_PATH"
          echo "BOX_REMOTE: $BOX_REMOTE"

          if find "$NEW_PATH" -maxdepth 1 -type f | grep -q .; then
            rclone copy "$NEW_PATH" "$BOX_REMOTE" \
              --ignore-existing \
              --filter '+ *.dat' \
              --filter '+ *.csv' \
              --filter '+ *.xlsx' \
              --filter '- *' \
              --transfers 4 \
              --checkers 8 \
              --verbose
          else
            echo "No files found in $NEW_PATH; nothing to upload."
          fi

      - name: Commit and push repository changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$LOG_FILE" "$SQMTABLE_CSV" "$NEW_PATH"

          if git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi

          git commit -m "Update SQM data, log, and sequence numbers"

          # Incorporate any remote commit that arrived while this job ran.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
