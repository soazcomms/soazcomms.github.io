name: DSN-get-SQM Data

on:
  schedule:
    - cron: '0 8 * * 2'  # 08:00 UTC every Tuesday
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dsn-rclone-box
  cancel-in-progress: false

env:
  NEW_PATH: "DSNdata/NEW/"
  BOX_REMOTE: "DSNBox:DSNdata/SQM/"
  MERGE_PATH: "DSNdata/MERGE/"
  SQMTABLE_CSV: "DSNdata/SQMtable.csv"
  LOG_FILE: "DSNdata/SQMdownloaded.log"

jobs:
  sync-sqm-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies and configure rclone
        shell: bash
        env:
          RCLONE_CONFIG_DATA: ${{ secrets.RCLONE_CONFIG }}
        run: |
          set -euo pipefail

          python3 -m pip install --upgrade pip
          python3 -m pip install pandas

          curl -fsSL https://rclone.org/install.sh | sudo bash

          mkdir -p "$HOME/.config/rclone"
          printf '%s\n' "$RCLONE_CONFIG_DATA" > "$HOME/.config/rclone/rclone.conf"
          chmod 600 "$HOME/.config/rclone/rclone.conf"

          echo "Configured remotes:"
          rclone listremotes

          rclone listremotes | grep -Fxq 'soazdsn:' || {
            echo "ERROR: soazdsn: is missing from RCLONE_CONFIG" >&2
            exit 1
          }

          rclone listremotes | grep -Fxq 'DSNBox:' || {
            echo "ERROR: DSNBox: is missing from RCLONE_CONFIG" >&2
            exit 1
          }

          echo "Testing Google Drive:"
          rclone lsd soazdsn: >/dev/null

          echo "Testing Box:"
          rclone lsd DSNBox: >/dev/null

      - name: Ensure log file exists
        shell: bash
        run: touch "$LOG_FILE"

      - name: Process each site in SQMtable.csv
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$SQMTABLE_CSV" ]; then
            echo "ERROR: $SQMTABLE_CSV not found" >&2
            exit 1
          fi

          mkdir -p "$NEW_PATH"
          awk 'NF' "$SQMTABLE_CSV" | sed 's/\r$//' > cleaned_sqm.csv

          while IFS=, read -r site_name sequence alias; do
            if [[ -z "$site_name" || "$site_name" == "Site" ]]; then
              continue
            fi

            echo "---- Processing Site: $site_name (Seq: $sequence)"
            SITE_FOLDER="soazdsn:DSNdata/DSNsites/$site_name"
            LOCAL_FOLDER="DSNdata/$site_name"
            mkdir -p "$LOCAL_FOLDER"

            echo "Checking for new .dat, .csv, and .xlsx files in $SITE_FOLDER..."
            rclone lsf "$SITE_FOLDER" --files-only \
              | grep -Ei '\.(dat|csv|xlsx)$' > available_files.txt || true

            grep -Fxvf "$LOG_FILE" available_files.txt > new_files.txt || true

            if [ -s new_files.txt ]; then
              echo "Downloading new files..."

              while IFS= read -r file; do
                [ -n "$file" ] || continue

                local_file="$LOCAL_FOLDER/$file"
                echo "Downloading: $file"
                rm -f "$local_file"
                rclone copyto "$SITE_FOLDER/$file" "$local_file" --verbose

                if [ ! -s "$local_file" ]; then
                  echo "ERROR: Download failed or produced an empty file: $local_file" >&2
                  exit 1
                fi
              done < new_files.txt

              python3 DSN_rename_sqm_files.py "$LOCAL_FOLDER" "$SQMTABLE_CSV"

              while IFS= read -r renamed_file; do
                [ -n "$renamed_file" ] || continue

                destination="$NEW_PATH$(basename "$renamed_file")"
                rm -f "$destination"
                mv "$renamed_file" "$destination"

                if [ ! -s "$destination" ]; then
                  echo "ERROR: Move to NEW failed or produced an empty file: $destination" >&2
                  exit 1
                fi

                echo "Moved $renamed_file to $destination"
              done < <(find "$LOCAL_FOLDER" -maxdepth 1 -type f ! -name '.*' -print)

              # Record the original remote filenames only after every download,
              # rename, and move for this site has succeeded.
              cat new_files.txt >> "$LOG_FILE"
            else
              echo "No new files for $site_name, skipping."
            fi
          done < cleaned_sqm.csv

      - name: Upload new files to Box
        shell: bash
        run: |
          set -euo pipefail

          echo "NEW_PATH: $NEW_PATH"
          echo "BOX_REMOTE: $BOX_REMOTE"

          if find "$NEW_PATH" -maxdepth 1 -type f | grep -q .; then
            rclone copy "$NEW_PATH" "$BOX_REMOTE" \
              --ignore-existing \
              --filter '+ *.dat' \
              --filter '+ *.csv' \
              --filter '+ *.xlsx' \
              --filter '- *' \
              --transfers 4 \
              --checkers 8 \
              --verbose
          else
            echo "No files found in $NEW_PATH; nothing to upload."
          fi

      - name: Save refreshed rclone config
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_PAT }}
        run: |
          set -euo pipefail

          CONFIG="$HOME/.config/rclone/rclone.conf"
          if [ ! -s "$CONFIG" ]; then
            echo "No rclone config was created; nothing to save."
            exit 0
          fi

          gh secret set RCLONE_CONFIG \
            --repo "$GITHUB_REPOSITORY" \
            < "$CONFIG"

      - name: Commit and push repository changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$LOG_FILE" "$SQMTABLE_CSV" "$NEW_PATH"

          if git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi

          git commit -m "Update SQM data, log, and sequence numbers"

          # Incorporate any remote commit that arrived while this job ran.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
